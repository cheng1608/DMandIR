<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8"/>
  <title>Java-ES仿京东搜索</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>

<body class="pg">
<div class="page" id="app">
  <div id="mallPage" class=" mallist tmall- page-not-market ">

    <!-- 头部搜索 -->
    <div id="header" class=" header-list-app">
      <div class="headerLayout">
        <div class="headerCon ">
          <!-- Logo-->
          <h1 id="mallLogo">
            <img th:src="@{/images/jdlogo.png}" alt="">
          </h1>

          <div class="header-extra">

            <!--搜索                        <input v-model.trim="keyword" id="keyword" @keyup="getAddress">-->
            <div id="mallSearch" class="mall-search">
              <form name="searchTop" class="mallSearch-form clearfix">
                <fieldset>
                  <legend>天猫搜索</legend>
                  <div class="mallSearch-input clearfix">
                    <div class="s-combobox" id="s-combobox-685">
                      <div class="s-combobox-input-wrap">
                        <input v-model="keyword" type="text" autocomplete="off" value="" id="mq"
                               class="s-combobox-input" aria-haspopup="true">
                      </div>
                    </div>
                    <button @click.prevent="searchPage" type="submit" id="searchbtn">搜索</button>
                  </div>
                </fieldset>
              </form>
              <ul class="relKeyTop">
                <li><a>Java</a></li>
                <li><a>Python</a></li>
                <li><a>机器问答</a></li>
                <li><a>信息检索</a></li>
                <li><a>人工智能</a></li>
              </ul>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="content">
    <div class="main">
      <!-- 品牌分类 -->
      <form class="navAttrsForm">
        <div class="attrs j_NavAttrs" style="display:block">
          <div class="brandAttr j_nav_brand">
            <div class="j_Brand attr">
              <div class="attrKey">
                品牌
              </div>
              <div class="attrValues">
                <ul class="av-collapse row-2">
                  <li><a href="#"> 机器问答 </a></li>
                  <li><a href="#"> 信息检索 </a></li>
                </ul>
              </div>
            </div>
          </div>
        </div>
      </form>

      <!-- 排序规则 -->
      <div class="filter clearfix">
        <a class="fSort fSort-cur">综合<i class="f-ico-arrow-d"></i></a>
        <a class="fSort">人气<i class="f-ico-arrow-d"></i></a>
        <a class="fSort">新品<i class="f-ico-arrow-d"></i></a>
        <a class="fSort">销量<i class="f-ico-arrow-d"></i></a>
        <a href="javascript:void(0)" class="fSort" :class="sortBy === 'price' ? 'fSort-cur' : ''" @click.stop.prevent="togglePriceSort">
          价格
          <i class="f-ico-triangle-mt" :style="{color: priceSortOrder === 'asc' ? '#f40' : ''}"></i>
          <i class="f-ico-triangle-mb" :style="{color: priceSortOrder === 'desc' ? '#f40' : ''}"></i>
        </a>
      </div>

      <!-- 商品详情 -->
      <div class="view grid-nosku">

        <div class="product" v-for="item in results">
          <div class="product-iWrap">
            <!--商品封面-->
            <div class="productImg-wrap">
              <a class="productImg">
                <img :src="item.img">
              </a>
            </div>
            <!--价格-->
            <p class="productPrice">
              <em>{{item.price}}</em>
            </p>
            <!--标题-->
            <p class="productTitle">
              <a v-html="item.title"></a>
            </p>
            <!-- 店铺名 -->
            <div class="productShop">
              <span>店铺： 实践课 </span>
            </div>
            <!-- 成交信息 -->
            <p class="productStatus">
              <span>月成交<em>999笔</em></span>
              <span>评价 <a>3</a></span>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
</div>
</body>

<script src="./js/vue.min.js"></script>
<script src="./js/axios.min.js"></script>
<script type="text/javascript">
  var vm = new Vue({
    el:'#app',
    data:{
      keyword:"",  //搜索关键字
      s1:"localhost:8080/search/java/1/10",
      address:"",
      results:[],  //搜索结果
      sortBy:"",
      priceSortOrder:"asc"
    },
    headers: {
      'Content-Type': 'application/x-www-form-urlencoded;charset=utf-8'
    },
    methods:{
      searchPage(){
        var keyword = this.keyword.toString();
        console.info(keyword);
        var currentSortOrder = this.sortBy === "price" ? this.priceSortOrder : "";
        axios.request({
            method: "POST",
            url:"http://localhost:8080/query",
            params:{
              keyword:this.keyword,
              pageNo:1,
              pageSize:20,
              sortBy:this.sortBy,
              sortOrder:currentSortOrder
            }
        }).then(response=>{
          this.results=response.data;
          //this.address=response.data.toString();
        })
        //axios.get("http://localhost:8080/search/"+keyword+"/1/20").then(response=>{
          //this.results=response.data;
          //this.address=response.data.toString();

        //axios.get("localhost:8080/search/"+keyword+"/1/10").then(response=>{
          //console.log(response.data)
          //this.results = res.data;
          //this.address=response.toString();
        //})
      },
      togglePriceSort(){
        if (this.sortBy !== "price") {
          this.sortBy = "price";
          this.priceSortOrder = "asc";
        } else {
          this.priceSortOrder = this.priceSortOrder === "asc" ? "desc" : "asc";
        }
        this.searchPage();
        }
    }
  })
</script>

</html>
